<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Monitoring Kasir Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .glass-header { background: rgba(30, 64, 175, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .card-premium { background: white; border-radius: 20px; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); transition: all 0.3s ease; }
        .tab-btn { transition: all 0.3s ease; }
        .tab-btn.active { background: #1e40af; color: white; transform: scale(1.05); box-shadow: 0 10px 15px -3px rgba(30, 64, 175, 0.3); }
        .status-badge { font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 9999px; text-transform: uppercase; }
        .pulse-warning { animation: warning-glow 2s infinite; }
        @keyframes warning-glow { 0%, 100% { border-color: #fee2e2; } 50% { border-color: #fca5a5; background-color: #fff1f2; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-12">

    <header class="glass-header sticky top-0 z-[100] text-white px-6 py-5 shadow-xl">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-extrabold tracking-tight">Monitoring Real-Time</h1>
                <div class="flex items-center gap-2 mt-1">
                    <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span></span>
                    <p class="text-[11px] font-medium text-blue-100 uppercase" id="last-update">Menghubungkan...</p>
                </div>
            </div>
            <button onclick="refreshData()" id="refresh-btn" class="p-3 bg-white/10 hover:bg-white/20 rounded-2xl transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
            </button>
        </div>
    </header>

    <div class="max-w-4xl mx-auto mt-6 px-4">
        <!-- Filter Section -->
        <div class="card-premium p-5 mb-6">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Area Manager</label>
                    <select id="filter-am" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold outline-none"><option value="">Semua AM</option></select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Area Coordinator</label>
                    <select id="filter-ac" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold outline-none"><option value="">Semua AC</option></select>
                </div>
            </div>
            <div class="relative">
                <input type="text" id="search-box" placeholder="Cari Nama, NIK, atau Kode Toko..." class="w-full p-4 pl-12 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium outline-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 absolute left-4 top-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex gap-3 mb-6 overflow-x-auto no-scrollbar py-2">
            <button onclick="switchTab('kecepatan')" id="tab-kecepatan" class="tab-btn active flex items-center gap-2 px-6 py-3 rounded-2xl text-xs font-bold whitespace-nowrap">⚡ Speed</button>
            <button onclick="switchTab('ttm')" id="tab-ttm" class="tab-btn bg-white border border-slate-200 text-slate-500 px-6 py-3 rounded-2xl text-xs font-bold whitespace-nowrap">🎁 TTM</button>
            <button onclick="switchTab('member')" id="tab-member" class="tab-btn bg-white border border-slate-200 text-slate-500 px-6 py-3 rounded-2xl text-xs font-bold whitespace-nowrap">👥 Member</button>
        </div>

        <div class="flex justify-between items-end mb-4 px-2">
            <div>
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest" id="current-title">Daftar Kecepatan</h2>
                <p class="text-[10px] text-slate-500 font-medium">Menampilkan <span id="count-display" class="text-blue-600 font-bold">0</span> kasir</p>
            </div>
            <div class="bg-red-50 text-red-700 px-3 py-1 rounded-lg text-[10px] font-bold">Urutan: Prioritas Review</div>
        </div>

        <div id="main-content" class="space-y-4">
            <div id="loading-state" class="flex flex-col items-center justify-center py-24">
                <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 text-sm text-slate-500 font-bold">Mengambil data dari Spreadsheet...</p>
            </div>
        </div>
    </div>

    <script>
        // SCRIPT_URL harus sesuai dengan URL Web App Apps Script Anda
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxnt1h_wieQhQh44w-rmrJA3XzLxrQ6cgvyBdIgUSrYBxLP7Ij2B-mTClI9jk3wNI-n/exec"; 

        const TARGETS = { kecepatan: 120, ttm: 25, member: 28 };
        let appData = { kecepatan: [], ttm: [], member: [], area: {}, lastUpdate: '' };
        let activeTab = 'kecepatan';
        let filters = { am: '', ac: '', search: '' };

        window.onload = () => refreshData();

        async function refreshData() {
            const btn = document.getElementById('refresh-btn');
            const loader = document.getElementById('loading-state');
            btn.classList.add('animate-spin');
            
            try {
                const response = await fetch(SCRIPT_URL);
                const rawData = await response.json();
                
                // Logging untuk mempermudah pengecekan data di Console (F12)
                console.log("Koneksi Berhasil. Data:", rawData);

                appData = {
                    kecepatan: rawData.kecepatan || [],
                    ttm: rawData.ttm || [],
                    member: rawData.member || [],
                    area: rawData.area || {},
                    lastUpdate: rawData.lastUpdate || new Date().toLocaleTimeString()
                };

                document.getElementById('last-update').innerText = "Update: " + appData.lastUpdate;
                populateSelects();
                render();
            } catch (e) {
                console.error("Gagal koneksi ke Spreadsheet:", e);
                document.getElementById('main-content').innerHTML = `
                    <div class='p-10 text-center text-red-500 font-bold card-premium'>
                        <p>Gagal mengambil data dari Spreadsheet.</p>
                        <p class="text-[10px] mt-2 text-slate-400 font-normal">Pastikan Apps Script telah di-deploy sebagai 'Web App' dengan akses 'Anyone'.</p>
                    </div>`;
            } finally {
                btn.classList.remove('animate-spin');
            }
        }

        // Fungsi dinamis untuk mengisi dropdown AM/AC
        function populateSelects() {
            const ams = new Set(), acs = new Set();
            Object.values(appData.area).forEach(a => { 
                if(a.am) ams.add(a.am); 
                if(a.ac) acs.add(a.ac); 
            });
            
            const amSel = document.getElementById('filter-am');
            const acSel = document.getElementById('filter-ac');
            
            const currentAM = amSel.value;
            const currentAC = acSel.value;

            amSel.innerHTML = '<option value="">Semua AM</option>';
            [...ams].sort().forEach(am => amSel.innerHTML += `<option value="${am}" ${am === currentAM ? 'selected' : ''}>${am}</option>`);
            
            acSel.innerHTML = '<option value="">Semua AC</option>';
            [...acs].sort().forEach(ac => acSel.innerHTML += `<option value="${ac}" ${ac === currentAC ? 'selected' : ''}>${ac}</option>`);

            amSel.onchange = (e) => { filters.am = e.target.value; render(); };
            acSel.onchange = (e) => { filters.ac = e.target.value; render(); };
            document.getElementById('search-box').oninput = (e) => { filters.search = e.target.value.toLowerCase(); render(); };
        }

        function switchTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.className = "tab-btn bg-white border border-slate-200 text-slate-500 px-6 py-3 rounded-2xl text-xs font-bold whitespace-nowrap";
            });
            document.getElementById(`tab-${tab}`).className = "tab-btn active flex items-center gap-2 px-6 py-3 rounded-2xl text-xs font-bold whitespace-nowrap";
            document.getElementById('current-title').innerText = "Daftar " + tab.charAt(0).toUpperCase() + tab.slice(1);
            render();
        }

        // Fungsi RENDER tunggal yang menghandle semua logika tampilan
        function render() {
            const container = document.getElementById('main-content');
            container.innerHTML = '';
            
            let source = appData[activeTab] || [];
            
            // Map data dan gabungkan dengan informasi Area berdasarkan Kode Toko
            let list = source.map(item => {
                const areaInfo = appData.area[item.kodeToko] || {};
                let val = 0;
                
                // Kalkulasi nilai berdasarkan tab yang aktif
                if (activeTab === 'kecepatan') val = parseFloat(item.avg) || 0;
                else if (activeTab === 'ttm') val = (item.qty50k > 0) ? (item.qtyRedeem / item.qty50k * 100) : 0;
                else if (activeTab === 'member') val = (item.totStruk > 0) ? (item.strukMember / item.totStruk * 100) : 0;
                
                return { ...item, ...areaInfo, displayVal: val };
            });

            // Filter berdasarkan input user
            const filtered = list.filter(item => {
                const matchAM = !filters.am || item.am === filters.am;
                const matchAC = !filters.ac || item.ac === filters.ac;
                const matchSearch = !filters.search || 
                                    (item.nama || "").toLowerCase().includes(filters.search) || 
                                    (item.nik || "").toString().includes(filters.search) ||
                                    (item.kodeToko || "").toLowerCase().includes(filters.search);
                return matchAM && matchAC && matchSearch;
            });

            // Sorting: Menampilkan performa terendah/terburuk di paling atas
            filtered.sort((a, b) => {
                if (activeTab === 'kecepatan') return b.displayVal - a.displayVal; // Speed tinggi = Buruk
                return a.displayVal - b.displayVal; // Persentase rendah = Buruk
            });

            document.getElementById('count-display').innerText = filtered.length;

            if (filtered.length === 0) {
                container.innerHTML = `<div class="p-10 text-center text-slate-400 card-premium">Tidak ada data yang sesuai filter</div>`;
                return;
            }

            filtered.forEach((item, i) => {
                // Logika ambang batas (Threshold)
                let isWarning = false;
                if (activeTab === 'kecepatan') isWarning = item.displayVal > TARGETS.kecepatan;
                else if (activeTab === 'ttm') isWarning = item.displayVal < TARGETS.ttm;
                else isWarning = item.displayVal < TARGETS.member;

                const card = document.createElement('div');
                card.className = `card-premium p-5 ${isWarning ? 'pulse-warning border-red-200' : ''}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-[9px] font-black bg-blue-100 text-blue-700 px-2 py-0.5 rounded">#${i+1}</span>
                                <h3 class="font-bold text-sm uppercase truncate">${item.nama || 'Tanpa Nama'}</h3>
                            </div>
                            <p class="text-xs text-blue-600 font-bold">NIK: ${item.nik || '-'}</p>
                            <p class="text-[10px] text-slate-500">${item.namaToko || 'Toko'} (${item.kodeToko || '-'})</p>
                            <div class="flex gap-1 mt-2">
                                <span class="text-[8px] font-bold bg-slate-100 px-2 py-1 rounded">AC: ${item.ac || '-'}</span>
                                <span class="text-[8px] font-bold bg-slate-100 px-2 py-1 rounded">AM: ${item.am || '-'}</span>
                            </div>
                        </div>
                        <div class="text-right shrink-0 ml-4">
                            <span class="status-badge ${isWarning ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">
                                ${isWarning ? 'Review' : 'OK'}
                            </span>
                            <p class="text-2xl font-black mt-2 ${isWarning ? 'text-red-600' : 'text-slate-800'}">
                                ${activeTab === 'kecepatan' ? item.displayVal.toFixed(1) : item.displayVal.toFixed(1) + '%'}
                            </p>
                            <p class="text-[8px] font-bold text-slate-400 uppercase">${activeTab === 'kecepatan' ? 'Detik' : 'Pencapaian'}</p>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
